controller_manager:
  ros__parameters:
    fr3_hand_controller:
      type: joint_trajectory_controller/JointTrajectoryController

fr3_hand_controller:
  ros__parameters:
    joints:
      - fr3_finger_joint1
      - fr3_finger_joint2

    command_interfaces:
      - position

    state_interfaces:
      - position
      - velocity

    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
